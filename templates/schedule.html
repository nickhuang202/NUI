<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scheduling Test: Single Machine Focus</title>
    <!-- FontAwesome for standard icons if needed (optional) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="/schedule_style.css?v=6">
</head>

<body>
    <div class="app-container glassmorphism-bg">
        <!-- Top Dashboard Status Panel -->
        <header class="status-dashboard glass-panel">
            <div class="machine-info">
                <h1 id="machine-name-display">Machine: Loading...</h1>
                <div class="status-indicator active">
                    <span class="dot"></span> Active
                </div>
            </div>

            <div class="time-control">
                <span>View: Day</span>
            </div>
        </header>

        <div class="main-layout">
            <!-- Left Sidebar: Test Library -->
            <aside class="test-library glass-panel">
                <h2>Saved Procedures</h2>
                <div class="search-bar">
                    <input type="text" placeholder="Search tests...">
                </div>
                <div class="draggable-items" id="test-palette">
                    <div style="padding:10px; color:var(--text-muted); text-align:center; font-size:0.9rem;">
                        Loading procedures...
                    </div>
                </div>
            </aside>

            <!-- Main Timeline Area -->
            <main class="timeline-container glass-panel">
                <div class="timeline-header"
                    style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h2 id="profile-title-display">Daily Schedule</h2>
                        <p class="subtitle" id="profile-schedule-display">Unsaved Profile: Drag tests below to build
                            your day.</p>
                    </div>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <select id="load-profile-select" class="input-control"
                            style="background: rgba(0,0,0,0.3); color: white; border: 1px solid var(--glass-border); padding: 8px 12px; border-radius: 6px; outline: none; cursor: pointer;">
                            <option value="">-- Load Profile --</option>
                        </select>
                        <button id="btn-delete-profile" class="btn"
                            style="background: rgba(217, 83, 79, 0.8); color: white; display: none;">Delete
                            Profile</button>
                        <button id="btn-open-save-modal" class="btn btn-primary">Save as Daily Profile...</button>
                    </div>
                </div>

                <div class="timeline-wrapper">
                    <div class="time-axis" id="time-axis">
                        <!-- Hour markers will be generated by JS -->
                    </div>

                    <!-- The single horizontal dropzone track -->
                    <div class="timeline-track" id="main-track">
                        <!-- Placed blocks will append here -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Drag template ghost for visual feedback -->
    <template id="scheduled-block-template">
        <div class="scheduled-block">
            <div class="block-time">HH:MM - HH:MM</div>
            <div class="block-title"></div>
            <div class="block-status">Scheduled</div>
            <div class="delete-btn">×</div>
            <div class="resize-handle"></div>
        </div>
    </template>

    <!-- Schedule Configuration Modal -->
    <div id="cron-modal" class="modal-overlay hidden">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h3 id="modal-title">Save Daily Profile</h3>
                <button id="close-modal" class="icon-btn">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Profile Name</label>
                    <input type="text" id="modal-profile-name" class="input-control"
                        placeholder="e.g. Weekday Full Suite">
                </div>

                <div class="form-group">
                    <label>Recurrence Frequency</label>
                    <select id="frequency-select" class="input-control">
                        <option value="single">Single Run (Today Only)</option>
                        <option value="daily">Daily</option>
                        <option value="weekly">Weekly</option>
                        <option value="monthly">Monthly</option>
                        <option value="custom">Custom Cron</option>
                    </select>
                </div>

                <!-- Dynamic Option Panels -->
                <div id="panel-weekly" class="freq-panel hidden">
                    <label>Run on days:</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" value="1"> Mon</label>
                        <label><input type="checkbox" value="2"> Tue</label>
                        <label><input type="checkbox" value="3"> Wed</label>
                        <label><input type="checkbox" value="4"> Thu</label>
                        <label><input type="checkbox" value="5"> Fri</label>
                        <label><input type="checkbox" value="6"> Sat</label>
                        <label><input type="checkbox" value="0"> Sun</label>
                    </div>
                </div>

                <div id="panel-custom" class="freq-panel hidden">
                    <label>Cron Expression (M H D M W)</label>
                    <input type="text" id="custom-cron-input" class="input-control" placeholder="* * * * *">
                </div>

                <div class="form-group" style="margin-top: 15px;">
                    <label>Profile Summary (<span id="summary-count">0</span> Procedures)</label>
                    <ul id="modal-summary-list" class="summary-list"
                        style="margin-top: 5px; list-style-type: none; padding: 0; display: flex; flex-direction: column; gap: 5px; max-height: 120px; overflow-y: auto;">
                        <!-- JS injected list items -->
                    </ul>
                </div>

                <div class="result-preview" style="margin-top: 15px;">
                    Rule Preview: <span id="rule-preview-text">Single Run</span>
                </div>
            </div>
            <div class="modal-footer">
                <button id="cancel-modal" class="btn btn-secondary">Cancel</button>
                <button id="save-modal" class="btn btn-primary">Save Profile and Assign Rule</button>
            </div>
        </div>
    </div>

    <!-- Application Script -->
    <script src="/schedule_app.js?v=13"></script>
</body>

</html>
